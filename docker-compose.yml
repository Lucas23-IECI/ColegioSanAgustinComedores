services:

  # ── Base de datos PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: colegio_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend Express ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: colegio_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USER:     ${DB_USER}
      DB_HOST:     postgres
      DB_NAME:     ${DB_NAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT:     5432
      JWT_SECRET:  ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PORT:        5000

  # ── Frontend React (build + nginx) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: colegio_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
